spec_version: 1
name: croppulse-ai
description: CropPulse AI is an OpenEnv-compatible irrigation intelligence environment with deterministic grading across easy, medium, and hard tasks.
type: space
runtime: fastapi
app: server_app:app
port: 8000

tasks:
  - name: easy
  - name: medium
  - name: hard

grader:
  path: grader/grader.py
  function: grade_all

metadata:
  author: Tensor Titans
  version: 1.2.0
